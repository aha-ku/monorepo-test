pre-commit:
  parallel: true
  jobs:
    - name: prettier
      run: npm run fmt {staged_files}
      glob: "*.{js,ts,jsx,tsx}"
    - name: cspell
      glob: "*.{js,ts,css,md,json,yml}"
      run: npm run lint:cspell {staged_files}
    - name: lint
      glob: "*.{js,ts}"
      run: npm run lint {staged_files}
